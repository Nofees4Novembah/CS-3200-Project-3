services:
  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: landlord-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=sublease_listing
    depends_on:
      - redis
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: landlord-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:7
    container_name: landlord-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
